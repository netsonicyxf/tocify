name: Similar Issue Detector

on:
  issues:
    types: [opened, edited, reopened]

concurrency:
  group: similar-issues-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-similar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and comment similar issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/find-similar-issues.mjs
